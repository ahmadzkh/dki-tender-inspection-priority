services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      provenance: false
      sbom: false
    image: dki-tender-inspection-api:local
    environment:
      PROJECT_ROOT: /app
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
